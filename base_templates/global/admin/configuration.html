<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
    {% include "xperience/partials/head.html" %}
    <title>{% block title %}{% endblock title %} | Xperience</title>
    <!-- user spaceon configuration styles -->
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon.css' %}?v=22">
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon_config.css' %}?v=17">
    <link rel="stylesheet" href="{% static 'xperience/css/workspaces.css' %}?v=8">
    <link rel="stylesheet" href="{% static 'xperience/css/user_avatar.css' %}?v=7">
</head>

<!-- body -->
<body data-theme="dark" class="home-page spaceon-page spaceon-config-page">

    <!-- container -->
    <div class="container">
        {% include "xperience/partials/messages.html" %}
        {% block admin_configuration_content %}
        {% endblock admin_configuration_content %}
    </div>

    <!-- scripts -->
    <script src="{% static 'xperience/js/header_user_menu.js' %}?v=1" defer></script>
    <script src="{% static 'xperience/js/admin_config_workspace_tabs.js' %}?v=6" defer></script>
    <script src="{% static 'xperience/js/admin_config_workspace_entity_modals.js' %}?v=7" defer></script>
    <script src="{% static 'xperience/js/admin_config_members_access.js' %}?v=4" defer></script>
    <script src="{% static 'xperience/js/admin_config_sortable_tables.js' %}?v=1" defer></script>
    <script>
        document.querySelectorAll("[data-config-toggle]").forEach(function (btn) {
            btn.addEventListener("click", function () {
                var card = btn.closest(".config-card");
                if (!card) return;
                var body = card.querySelector(".config-form");
                if (!body) return;
                var hidden = body.getAttribute("data-collapsed") === "1";
                if (hidden) {
                    body.style.display = "";
                    body.removeAttribute("data-collapsed");
                } else {
                    body.style.display = "none";
                    body.setAttribute("data-collapsed", "1");
                }
                var icon = btn.querySelector("i");
                if (icon) {
                    icon.classList.toggle("fa-eye-slash", hidden);
                    icon.classList.toggle("fa-eye", !hidden);
                }
            });
        });
    </script>
</body>
</html>
