<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
    {% include "xperience/partials/head.html" %}
    <title>{% block title %}{% endblock title %} | Xperience</title>
    <!-- user spaceon dashboard styles -->
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon.css' %}?v=22">
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon_dashboard.css' %}?v=4">
    <link rel="stylesheet" href="{% static 'xperience/css/user_avatar.css' %}?v=7">
</head>



<!-- body -->
<body data-theme="dark" class="home-page spaceon-page spaceon-dashboard-page admin-spaceon-dashboard-page">

    <!-- container -->
    <div class="container">
        {% include "xperience/partials/messages.html" %}
        {% block admin_dashboard_content %}
        {% endblock admin_dashboard_content %}
    </div>

    <!-- scripts -->
    <script src="{% static 'xperience/js/header_user_menu.js' %}?v=1" defer></script>
</body>
</html>
