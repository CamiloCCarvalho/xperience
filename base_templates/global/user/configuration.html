<!DOCTYPE html>
<html lang="pt-br">
{% load static %}

<head>
    {% include "xperience/partials/head.html" %}
    <title>{% block title %}{% endblock title %} | Xperience</title>
    <!-- user spaceon configuration styles -->
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon.css' %}?v=22">
    <link rel="stylesheet" href="{% static 'xperience/css/spaceon_config.css' %}?v=12">
    <link rel="stylesheet" href="{% static 'xperience/css/button_logout.css' %}?v=1">
    <link rel="stylesheet" href="{% static 'xperience/css/workspaces.css' %}?v=8">
    <link rel="stylesheet" href="{% static 'xperience/css/user_avatar.css' %}?v=7">
</head>
</head>



<!-- body -->
<body data-theme="dark" class="home-page spaceon-page spaceon-config-page">

    <!-- container -->
    <div class="container">
        {% include "xperience/partials/messages.html" %}
        {% block user_configuration_content %}
        {% endblock user_configuration_content %}
    </div>

    <!-- scripts -->
    <script src="{% static 'xperience/js/header_user_menu.js' %}?v=1" defer></script>
</body>
</html>
