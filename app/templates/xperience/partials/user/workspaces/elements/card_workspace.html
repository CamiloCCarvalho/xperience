<li>
    <a href="/user/spaceon/home">
        <article class="workspace-card">
            <!-- avatar -->
            <div class="workspace-card-avatar" aria-hidden="true">
                <img src="{{ workspace.workspace_avatar.url }}" alt="Avatar do workspace" />
            </div>
            <!-- name -->
            <h2 class="workspace-name">{{ workspace.workspace_name }}</h2>
            <!-- description -->
            <p class="workspace-description">{{ workspace.workspace_description }}</p>
        </article>
    </a>
</li>
