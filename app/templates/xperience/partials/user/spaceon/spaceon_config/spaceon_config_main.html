<!-- main content -->
<main class="main">
    <section class="main-container">
        <div class="spaceon-grid">
            <article class="spaceon-card config-card">
                <header class="config-card-header">
                    <div class="config-card-title">
                        <i class="fas fa-building" aria-hidden="true"></i>
                        <h2>Configurações</h2>
                    </div>
                    <button type="button" class="config-visibility-btn" aria-label="Ocultar ou mostrar painel">
                        <i class="fas fa-eye-slash" aria-hidden="true"></i>
                    </button>
                </header>

                <form class="config-form" action="#" method="post">
                    <div>
                        Conteudo pendente
                    </div>
                    <div class="config-actions">
                        <button type="submit" class="config-btn-save">
                            <i class="fas fa-save" aria-hidden="true"></i>
                            Button
                        </button>
                    </div>
                </form>
            </article>
        </div>
    </section>
</main>
