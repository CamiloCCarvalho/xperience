{% load static %}
<input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}" id="member-mural-csrf" autocomplete="off" />
{{ mural|json_script:"member-mural-initial" }}
{{ mural_ui|json_script:"member-mural-ui" }}
<div id="member-mural-root" class="member-mural-root" aria-live="polite">
    <p class="member-mural-loading">Carregando mural…</p>
</div>

<dialog id="member-mural-card-dialog" class="member-mural-dialog">
    <form id="member-mural-card-form" class="member-mural-dialog__form" novalidate>
        <header class="member-mural-dialog__head">
            <h3 id="member-mural-card-dialog-title" class="member-mural-dialog__title">Card</h3>
            <button type="button" class="member-mural-dialog__close" data-mural-close-card aria-label="Fechar">×</button>
        </header>
        <div class="member-mural-dialog__body">
            <input type="hidden" id="member-mural-card-id" value="" />
            <input type="hidden" id="member-mural-card-mode" value="" />
            <input type="hidden" id="member-mural-card-default-column" value="" />
            <label class="member-mural-field">
                <span>Título</span>
                <input type="text" id="member-mural-card-title" required maxlength="255" />
            </label>
            <label class="member-mural-field">
                <span>Descrição</span>
                <textarea id="member-mural-card-description" rows="3"></textarea>
            </label>
            <label class="member-mural-field">
                <span>Categoria</span>
                <input type="text" id="member-mural-card-category" maxlength="64" />
            </label>
            <div class="member-mural-field-row">
                <label class="member-mural-field">
                    <span>Data do evento</span>
                    <input type="date" id="member-mural-card-event-date" />
                </label>
                <label class="member-mural-field">
                    <span>Prazo</span>
                    <input type="date" id="member-mural-card-due-date" />
                </label>
            </div>
            <label class="member-mural-field">
                <span>Cliente</span>
                <select id="member-mural-card-client">
                    <option value="">—</option>
                </select>
            </label>
            <label class="member-mural-field">
                <span>Projeto</span>
                <select id="member-mural-card-project">
                    <option value="">—</option>
                </select>
            </label>
            <label class="member-mural-field">
                <span>Tarefa</span>
                <select id="member-mural-card-task">
                    <option value="">—</option>
                </select>
            </label>
            <label class="member-mural-field">
                <span>Meta</span>
                <select id="member-mural-card-goal">
                    <option value="">—</option>
                </select>
            </label>
            <label class="member-mural-field">
                <span>Membro atribuído</span>
                <select id="member-mural-card-assign-user">
                    <option value="">—</option>
                </select>
            </label>
            <label class="member-mural-field">
                <span>Departamento atribuído</span>
                <select id="member-mural-card-assign-dept">
                    <option value="">—</option>
                </select>
            </label>
        </div>
        <footer class="member-mural-dialog__foot">
            <button type="button" class="member-mural-btn member-mural-btn--ghost" data-mural-close-card>Cancelar</button>
            <button type="button" class="member-mural-btn member-mural-btn--danger" id="member-mural-card-delete" hidden>Excluir</button>
            <button type="submit" class="member-mural-btn member-mural-btn--primary" id="member-mural-card-save">Salvar</button>
        </footer>
    </form>
</dialog>

<dialog id="member-mural-column-dialog" class="member-mural-dialog">
    <form id="member-mural-column-form" class="member-mural-dialog__form" novalidate>
        <header class="member-mural-dialog__head">
            <h3 id="member-mural-column-dialog-title" class="member-mural-dialog__title">Coluna</h3>
            <button type="button" class="member-mural-dialog__close" data-mural-close-column aria-label="Fechar">×</button>
        </header>
        <div class="member-mural-dialog__body">
            <input type="hidden" id="member-mural-column-id" value="" />
            <label class="member-mural-field">
                <span>Nome</span>
                <input type="text" id="member-mural-column-name" required maxlength="120" />
            </label>
        </div>
        <footer class="member-mural-dialog__foot">
            <button type="button" class="member-mural-btn member-mural-btn--ghost" data-mural-close-column>Cancelar</button>
            <button type="submit" class="member-mural-btn member-mural-btn--primary" id="member-mural-column-save">Salvar</button>
        </footer>
    </form>
</dialog>

<script src="{% static 'xperience/js/mural_board.js' %}?v=1" defer></script>
