{# Primeira linha do menu do avatar (logado): rótulo + toggle de tema. IDs usados por switch_theme.js #}
<div class="header-user-menu__theme-row" role="none">
    <span class="header-user-menu__theme-label" id="header-user-menu-theme-label">Mudar tema</span>
    <button
        type="button"
        class="theme-toggle-btn header-user-menu__theme-toggle"
        id="theme-toggle-btn"
        aria-labelledby="header-user-menu-theme-label"
        title="Alternar entre tema claro e escuro"
    >
        <i class="fas fa-toggle-off icon-theme" id="theme-toggle-icon" aria-hidden="true"></i>
    </button>
</div>
<div class="header-user-menu__sep" role="separator" aria-hidden="true"></div>
