{% load static %}
<script src="{% static 'xperience/js/xperience_toast.js' %}"></script>
{% if messages %}
<div id="toast-messages-root" class="toast-messages" aria-live="polite" aria-atomic="false">
    {% for message in messages %}
    <div class="toast-msg toast-msg--{{ message.level_tag }}" role="{% if message.level_tag == 'error' or message.level_tag == 'warning' %}alert{% else %}status{% endif %}">
        <span class="toast-msg__text">{{ message }}</span>
        <button type="button" class="toast-msg__close" aria-label="Fechar notificação">&times;</button>
    </div>
    {% endfor %}
</div>
<script>
(function () {
    if (window.xperienceInitServerToastsFromDom) {
        xperienceInitServerToastsFromDom();
    }
})();
</script>
{% endif %}
