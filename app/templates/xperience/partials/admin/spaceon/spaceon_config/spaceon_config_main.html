<main class="main">

    <section class="main-container">
        <div class="spaceon-grid">
            <article class="spaceon-card config-card">
                <header class="config-card-header">
                    <div class="config-card-title">
                        <i class="fas fa-building" aria-hidden="true"></i>
                        <h2>Gerenciar Empresa</h2>
                    </div>
                    <button type="button" class="config-visibility-btn" aria-label="Ocultar ou mostrar painel">
                        <i class="fas fa-eye-slash" aria-hidden="true"></i>
                    </button>
                </header>

                <form class="config-form" action="#" method="post">
                    <div class="config-grid config-grid-two">
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Atualizar Nome da Empresa</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="Empresa1">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Descrição da Empresa</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="Descrição aqui">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Data de Fundação da Empresa</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="15/05/2023">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Logomarca da Empresa</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="file" value="Selecionar arquivo">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Número de Funcionários</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="60">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Número de Clientes</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="100">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Número de Projetos</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="12">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Número de Tarefas</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="26">
                            </div>
                        </div>
                        <div class="config-field">
                            <label for="cfg-data-nascimento">Número de Fornecedores</label>
                            <div class="field-with-icon">
                                <input id="cfg-data-nascimento" type="text" value="5">
                            </div>
                        </div>
                    </div>


                    <div class="config-actions">
                        <button type="submit" class="config-btn-save">
                            <i class="fas fa-save" aria-hidden="true"></i>
                            Atualizar dados
                        </button>
                    </div>
                </form>
            </article>
        </div>
    </section>
