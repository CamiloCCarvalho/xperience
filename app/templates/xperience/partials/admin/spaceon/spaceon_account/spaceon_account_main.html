<!-- main content -->
<main class="main">
    <section class="main-container">
        <div class="spaceon-grid">
            <article class="spaceon-card acc-card">
                <header class="acc-header">
                    <div class="acc-title-wrap">
                        <i class="fas fa-id-badge" aria-hidden="true"></i>
                        <h2>Dados da Conta</h2>
                    </div>
                </header>

                <form class="acc-form" action="#" method="post">
                    <section class="acc-profile">
                        <div class="acc-photo-box" aria-label="Foto do funcionário">
                            <div class="acc-photo-circle">
                                <i class="fas fa-user" aria-hidden="true"></i>
                            </div>
                            <button type="button" class="acc-photo-btn">Alterar foto</button>
                        </div>

                        <div class="acc-identity">
                            <div class="acc-field">
                                <label for="acc-fullname">Nome completo</label>
                                <input id="acc-fullname" type="text" value="Camilo Carvalho">
                            </div>
                            <div class="acc-field">
                                <label for="acc-role">Cargo</label>
                                <input id="acc-role" type="text" value="Desenvolvedor Python RPA">
                            </div>
                            <div class="acc-field">
                                <label for="acc-team">Equipe / Área</label>
                                <input id="acc-team" type="text" value="Automação e Time Tracking">
                            </div>
                        </div>
                    </section>

                    <section class="acc-grid">
                        <div class="acc-field">
                            <label for="acc-phone">Telefone</label>
                            <input id="acc-phone" type="text" value="+55 (11) 99999-9999">
                        </div>
                        <div class="acc-field">
                            <label for="acc-email">E-mail de acesso</label>
                            <input id="acc-email" type="email" value="camilo@empresa.com">
                        </div>
                        <div class="acc-field">
                            <label for="acc-address">Endereço</label>
                            <input id="acc-address" type="text" value="Rua Exemplo, 123 - São Paulo/SP">
                        </div>
                        <div class="acc-field">
                            <label for="acc-project-main">Projeto principal</label>
                            <input id="acc-project-main" type="text" value="Projeto Time Tracker">
                        </div>
                        <div class="acc-field">
                            <label for="acc-projects">Projetos ativos</label>
                            <input id="acc-projects" type="text" value="4 projetos ativos">
                        </div>
                        <div class="acc-field">
                            <label for="acc-permission">Nível de acesso</label>
                            <input id="acc-permission" type="text" value="Funcionário">
                        </div>
                    </section>

                    <section class="acc-security">
                        <h3>Segurança e acesso</h3>
                        <div class="acc-security-actions">
                            <button type="button" class="acc-btn acc-btn-outline">Ver/Trocar senha</button>
                            <button type="button" class="acc-btn acc-btn-outline">Solicitar troca de e-mail</button>
                            <button type="button" class="acc-btn acc-btn-outline">Ativar autenticação em 2 fatores</button>
                        </div>
                    </section>

                    <section class="acc-summary">
                        <h3>Resumo de atuação</h3>
                        <div class="acc-summary-grid">
                            <div class="acc-summary-item">
                                <span>Horas no mês</span>
                                <strong>160h</strong>
                            </div>
                            <div class="acc-summary-item">
                                <span>Horas esta semana</span>
                                <strong>38h</strong>
                            </div>
                            <div class="acc-summary-item">
                                <span>Projetos em andamento</span>
                                <strong>4</strong>
                            </div>
                            <div class="acc-summary-item">
                                <span>Valor/hora</span>
                                <strong>R$ 25,57</strong>
                            </div>
                        </div>
                    </section>

                    <div class="acc-actions">
                        <button type="submit" class="acc-btn acc-btn-primary">
                            <i class="fas fa-save" aria-hidden="true"></i>
                            Salvar alterações
                        </button>
                    </div>
                </form>
            </article>
        </div>
    </section>
</main>
